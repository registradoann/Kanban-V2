<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Evergreen</title>

<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
/* SIMPLE CENTERED LOGIN */
.login-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    text-align: center;
}

.login-box input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: none;
}

.login-box button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #54AD7C;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.login-box button:hover {
    background: #469a6b;
}
</style>

</head>

<body>

<div class="login-container">
    <div class="login-box">

        <h2>Evergreen Login</h2>

        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">

        <button onclick="login()">Login</button>

    </div>
</div>

<script>

function login() {
    const user = document.getElementById('loginUser').value;
    const pass = document.getElementById('loginPass').value;

    // TEMP login (frontend only)
    if (user === "admin" && pass === "1234") {

        localStorage.setItem("loggedIn", "true");

        window.location.href = "Kanban V2.html"; // your kanban page

    } else {
        alert("Invalid credentials");
    }
}

</script>

</body>
</html>
